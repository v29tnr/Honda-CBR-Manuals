<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 Manual</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* dFlip container — no fixed height so landscape pages aren't squished */
    #book_pdf { width: 100%; }
  </style>
</head>
<body>

<!-- dFlip flipbook target -->
<div class="_df_book" id="book_pdf"></div>

<!-- jQuery (required by dFlip) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<!-- Tell dFlip where its CDN assets live (must be before dflip.min.js) -->
<script>var dFlipLocation = 'https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/';</script>
<!-- dFlip JS -->
<script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

<script>
  // dFlip configuration — variable name must be option_<element-id>
  var option_book_pdf = {
    source: 'F3manual.pdf',
    webgl: true
  };
</script>
</body>
</html>
