<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>F3 Manual</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #8892a4;
      --page-bg: #fdf6e3;
      --shadow: rgba(0,0,0,0.6);
      --header-h: 50px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    header {
      height: var(--header-h);
      min-height: var(--header-h);
      background: var(--panel);
      display: flex;
      align-items: center;
      padding: 0 0.6rem;
      gap: 0.4rem;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
      overflow: hidden;
    }

    .title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      margin-right: 0.2rem;
    }

    .sep { width: 1px; height: 22px; background: #333; flex-shrink: 0; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 0.3rem 0.65rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    button:hover { opacity: 0.82; }
    button:disabled { background: #2e2e4e; color: #555; cursor: not-allowed; }

    .icon-btn { padding: 0.3rem 0.45rem; font-size: 1rem; line-height: 1; }

    .page-info {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    #pageInput {
      width: 3.2rem;
      text-align: center;
      background: #0d0d1f;
      color: var(--text);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.22rem 0.3rem;
      font-size: 0.82rem;
    }

    select {
      background: #0d0d1f;
      color: var(--text);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.22rem 0.35rem;
      font-size: 0.78rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Search panel overlays — fixed, never shifts layout */
    #searchPanel {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: var(--panel);
      border-bottom: 2px solid var(--accent);
      padding: 0.55rem 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.45rem;
      z-index: 60;
      max-height: 55vh;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #searchPanel.open { display: flex; }

    .search-row { display: flex; gap: 0.4rem; }
    #searchInput {
      flex: 1;
      background: #0d0d1f;
      color: var(--text);
      border: 1px solid #444;
      border-radius: 5px;
      padding: 0.38rem 0.55rem;
      font-size: 0.88rem;
    }
    #searchInput:focus { outline: none; border-color: var(--accent); }

    #searchStatus { font-size: 0.76rem; color: var(--muted); min-height: 1em; }

    #searchResults {
      overflow-y: auto;
      max-height: 40vh;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .sr {
      background: #0d0d1f;
      border: 1px solid #252545;
      border-radius: 5px;
      padding: 0.38rem 0.55rem;
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1.4;
      transition: border-color .15s;
    }
    .sr:hover { border-color: var(--accent); }
    .sr .pn { color: var(--accent); font-weight: 700; margin-right: 0.35rem; }
    .sr .snip { color: var(--muted); }
    .sr mark { background: rgba(233,69,96,0.35); color: var(--text); border-radius: 2px; padding: 0 1px; }

    /* Main area: sidebar + viewport — each scroll independently */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar scrolls on its own — never moves the page */
    #sidebar {
      width: 115px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid #232343;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: #0d0d1f; }
    #sidebar::-webkit-scrollbar-thumb { background: #5a5a8a; border-radius: 2px; }

    .thumb-item {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      background: #0d0d1f;
      transition: border-color .15s;
    }
    .thumb-item:hover  { border-color: var(--muted); }
    .thumb-item.active { border-color: var(--accent); }
    .thumb-item canvas { display: block; width: 100%; height: auto; }
    .thumb-label {
      text-align: center;
      font-size: 0.63rem;
      color: var(--muted);
      padding: 1px 0 2px;
    }

    /* Viewport scrolls on its own */
    #viewport {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }

    #bookWrapper {
      position: relative;
      filter: drop-shadow(0 6px 28px var(--shadow));
      flex-shrink: 0;
    }
    #bookWrapper::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: -7px;
      width: 11px;
      background: linear-gradient(to right,#777 0%,#ccc 40%,#aaa 60%,#555 100%);
      border-radius: 3px 0 0 3px;
      z-index: 1;
    }
    canvas#pdfCanvas {
      display: block;
      background: var(--page-bg);
      border-radius: 0 3px 3px 0;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
    }
    .spinner {
      width: 46px; height: 46px;
      border: 5px solid #2a2a4a;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingText { color: var(--muted); font-size: 0.88rem; }

    .swipe-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(233,69,96,0.85);
      color: #fff;
      font-size: 1.8rem;
      padding: 0.4rem 0.7rem;
      border-radius: 7px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s;
      z-index: 200;
    }
    #swipeL { left:  0.6rem; }
    #swipeR { right: 0.6rem; }
    .swipe-arrow.show { opacity: 1; }

    #hint {
      position: fixed;
      bottom: 0.5rem; right: 0.7rem;
      font-size: 0.66rem;
      color: #252545;
      pointer-events: none;
      user-select: none;
    }

    /* In-viewport nav arrows flanking the book */
    .vp-nav {
      align-self: center;
      flex-shrink: 0;
      background: rgba(233,69,96,0.13);
      color: var(--accent);
      border: 1px solid rgba(233,69,96,0.28);
      border-radius: 8px;
      font-size: 1.6rem;
      line-height: 1;
      padding: 0.8rem 0.5rem;
      cursor: pointer;
      transition: background .18s;
    }
    .vp-nav:hover:not(:disabled) { background: rgba(233,69,96,0.42); opacity: 1; }
    .vp-nav:disabled { background: rgba(30,30,60,0.4); opacity: 0.18; cursor: default; }

    /* Highlight overlay — sits directly over the PDF canvas */
    #highlightCanvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      border-radius: 0 3px 3px 0;
    }

    /* TOC panel */
    #tocPanel {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: var(--panel);
      border-bottom: 2px solid var(--accent);
      padding: 0.55rem 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      z-index: 60;
      max-height: 70vh;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #tocPanel.open { display: flex; }
    #tocStatus { font-size: 0.76rem; color: var(--muted); }
    #tocResults {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
    }
    .toc-item {
      background: #0d0d1f;
      border: 1px solid #252545;
      border-radius: 4px;
      padding: 0.32rem 0.55rem;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      transition: border-color .15s;
    }
    .toc-item:hover { border-color: var(--accent); }
    .toc-name { color: var(--text); flex: 1; }
    .toc-ref  { color: var(--accent); font-weight: 700; font-size: 0.73rem; white-space: nowrap; }

    .toc-item.toc-sub { border-left: 2px solid #333366; }
    .toc-item.toc-sub .toc-name { padding-left: 1rem; font-size: 0.74rem; color: var(--muted); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #5a5a8a; border-radius: 3px; }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (pointer: coarse), (max-width: 600px) {
      /* Hide in-viewport nav arrows — use swipe instead */
      .vp-nav { display: none !important; }

      /* Sidebar hidden by default on mobile */
      #sidebar { display: none; }

      /* Compact header */
      .title { display: none; }
      .sep   { display: none; }
      header { gap: 0.25rem; padding: 0 0.3rem; }
      button { padding: 0.28rem 0.5rem; font-size: 0.78rem; }
      #pageInput { width: 2.6rem; }

      /* Full-width viewport padding */
      #viewport { padding: 0.4rem; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading F3 Manual…</div>
</div>

<header>
  <span class="title">F3 Manual</span>
  <div class="sep"></div>
  <button class="icon-btn" id="sidebarToggle" title="Toggle page list">&#9776;</button>
  <button class="icon-btn" id="searchToggle"  title="Search text">&#128269;</button>
  <button class="icon-btn" id="tocToggle"     title="Table of Contents">&#128195;</button>
  <div class="sep"></div>
  <button id="prevBtn" disabled>&#8592;</button>
  <div class="page-info">
    <input id="pageInput" type="number" min="1" value="1" />
    <span>/ <span id="totalPages">&#8211;</span></span>
  </div>
  <button id="nextBtn" disabled>&#8594;</button>
  <div class="sep"></div>
  <button class="icon-btn" id="zoomOut" title="Zoom out">&#8722;</button>
  <select id="zoomSelect">
    <option value="auto"  selected>Auto Fit</option>
    <option value="fitw">Fit Width</option>
    <option value="fith">Fit Height</option>
    <option value="0.5">50%</option>
    <option value="0.75">75%</option>
    <option value="1">100%</option>
    <option value="1.25">125%</option>
    <option value="1.5">150%</option>
    <option value="2">200%</option>
  </select>
  <button class="icon-btn" id="zoomIn" title="Zoom in">&#43;</button>
</header>

<div id="searchPanel">
  <div class="search-row">
    <input id="searchInput" type="search" placeholder="Search manual…" autocomplete="off" />
    <button id="searchBtn">Go</button>
  </div>
  <div id="searchStatus"></div>
  <div id="searchResults"></div>
</div>

<div id="tocPanel">
  <div id="tocStatus">Building contents…</div>
  <div id="tocResults"></div>
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="viewport">
    <button class="vp-nav" id="vpPrevBtn" disabled>&#8592;</button>
    <div id="bookWrapper">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="highlightCanvas"></canvas>
    </div>
    <button class="vp-nav" id="vpNextBtn" disabled>&#8594;</button>
  </div>
</div>

<div class="swipe-arrow" id="swipeL">&#8592;</div>
<div class="swipe-arrow" id="swipeR">&#8594;</div>
<div id="hint">&#8592; &#8594; arrow keys &nbsp;&middot;&nbsp; swipe to turn pages</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL     = 'F3manual.pdf';
  const THUMB_SCALE = 0.14;

  let pdfDoc        = null;
  let currentPage   = 1;
  let currentScale  = 'auto';
  const _mobileInit   = window.matchMedia('(pointer: coarse), (max-width: 600px)').matches;
  let sidebarVisible  = !_mobileInit;
  let searchIndexed  = false;
  let activeRender   = null;
  let highlightQuery = null;
  const textIndex    = new Map();
  const labelToPage  = new Map(); // "1-1" -> PDF page index

  const canvas          = document.getElementById('pdfCanvas');
  const ctx             = canvas.getContext('2d');
  const highlightCanvas = document.getElementById('highlightCanvas');
  const prevBtn         = document.getElementById('prevBtn');
  const nextBtn       = document.getElementById('nextBtn');
  const pageInput     = document.getElementById('pageInput');
  const totalSpan     = document.getElementById('totalPages');
  const zoomSelect    = document.getElementById('zoomSelect');
  const sidebar       = document.getElementById('sidebar');
  if (!sidebarVisible) sidebar.style.display = 'none';
  const viewport_el   = document.getElementById('viewport');
  const overlay       = document.getElementById('loadingOverlay');
  const loadingText   = document.getElementById('loadingText');
  const searchPanel   = document.getElementById('searchPanel');
  const searchInput   = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const searchStatus  = document.getElementById('searchStatus');

  // Auto: landscape = fit inside viewport (no scroll), portrait = fit width
  function computeScale(page) {
    const raw    = page.getViewport({ scale: 1 });
    const pad    = 32;
    const availW = viewport_el.clientWidth  - pad;
    const availH = viewport_el.clientHeight - pad;
    // On touch/mobile the vp-nav buttons are hidden, so don't subtract their width
    var isMobile = window.matchMedia('(pointer: coarse), (max-width: 600px)').matches;
    var navW = isMobile ? 0 : 110;
    const availWBook = availW - navW;
    switch (currentScale) {
      case 'auto': return Math.min(availWBook / raw.width, availH / raw.height);
      case 'fitw': return availWBook / raw.width;
      case 'fith': return availH / raw.height;
      default:     return parseFloat(currentScale);
    }
  }

  async function renderPage(num) {
    if (!pdfDoc) return;
    num = Math.max(1, Math.min(num, pdfDoc.numPages));
    if (activeRender) { try { activeRender.cancel(); } catch(_){} activeRender = null; }

    const page  = await pdfDoc.getPage(num);
    const scale = computeScale(page);
    const vp    = page.getViewport({ scale });
    canvas.width  = vp.width;
    canvas.height = vp.height;

    activeRender = page.render({ canvasContext: ctx, viewport: vp });
    try { await activeRender.promise; }
    catch (e) { if (e && e.name !== 'RenderingCancelledException') console.warn(e); return; }
    activeRender = null;

    // Sync highlight overlay size and redraw
    highlightCanvas.width  = canvas.width;
    highlightCanvas.height = canvas.height;
    if (highlightQuery) {
      drawHighlights(page, highlightQuery, vp);
    } else {
      highlightCanvas.getContext('2d').clearRect(0, 0, highlightCanvas.width, highlightCanvas.height);
    }

    // scroll only the viewport panel, not the window
    viewport_el.scrollTop  = 0;
    viewport_el.scrollLeft = 0;

    currentPage      = num;
    pageInput.value  = num;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;
    document.getElementById('vpPrevBtn').disabled = num <= 1;
    document.getElementById('vpNextBtn').disabled = num >= pdfDoc.numPages;
    scrollThumbIntoView(num);
  }

  // Scroll the sidebar to show the active thumb — never touches window scroll
  function scrollThumbIntoView(num) {
    const items = sidebar.querySelectorAll('.thumb-item');
    items.forEach((el, i) => el.classList.toggle('active', i + 1 === num));
    const active = items[num - 1];
    if (!active) return;
    const top    = active.offsetTop;
    const bottom = top + active.offsetHeight;
    const visTop = sidebar.scrollTop;
    const visBot = visTop + sidebar.clientHeight;
    if (top < visTop)      sidebar.scrollTop = top - 6;
    else if (bottom > visBot) sidebar.scrollTop = bottom - sidebar.clientHeight + 6;
  }

  // Draw yellow highlight boxes over text items matching query
  async function drawHighlights(page, query, vp) {
    const hctx = highlightCanvas.getContext('2d');
    hctx.clearRect(0, 0, highlightCanvas.width, highlightCanvas.height);
    if (!query) return;
    var tc;
    try { tc = await page.getTextContent(); } catch(e) { return; }
    var queryLow = query.toLowerCase();
    var vt = vp.transform; // [a, b, c, d, tx, ty]
    hctx.fillStyle = 'rgba(255, 210, 0, 0.45)';
    hctx.strokeStyle = 'rgba(220, 140, 0, 0.6)';
    hctx.lineWidth = 1;
    tc.items.forEach(function(item) {
      if (!item.str || !item.str.toLowerCase().includes(queryLow)) return;
      var e = item.transform[4], f = item.transform[5];
      var w = item.width, h = item.height;
      // Map PDF-space rect corners to canvas coords
      var cx_bl = vt[0]*e       + vt[2]*f       + vt[4];
      var cy_bl = vt[1]*e       + vt[3]*f       + vt[5];
      var cx_tr = vt[0]*(e+w)   + vt[2]*(f+h)   + vt[4];
      var cy_tr = vt[1]*(e+w)   + vt[3]*(f+h)   + vt[5];
      var rx = Math.min(cx_bl, cx_tr);
      var ry = Math.min(cy_bl, cy_tr);
      var rw = Math.abs(cx_tr - cx_bl);
      var rh = Math.abs(cy_tr - cy_bl);
      if (rw > 0 && rh > 0) { hctx.fillRect(rx, ry, rw, rh); hctx.strokeRect(rx, ry, rw, rh); }
    });
  }

  async function buildThumbs() {
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const vp   = page.getViewport({ scale: THUMB_SCALE });
      const c    = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

      // Extract page label (e.g. "2-5") — 4-pass strategy for robustness
      var pageLabel = String(i);
      try {
        var tc2    = await page.getTextContent();
        var pitems = tc2.items.filter(function(it){ return it.str.trim().length > 0; });
        var dp     = '[-\u2013\u2011\u2012]';
        var reAny  = new RegExp('(\\d+' + dp + '\\d+)');
        var reExact= new RegExp('^\\d+' + dp + '\\d+$');
        var norm   = function(s){ return s.replace(/[\u2013\u2011\u2012]/g,'-'); };
        var label  = null;

        if (pitems.length > 0) {
          // Find y range (PDF coords: 0=bottom, maxY=top)
          var minY = Infinity, maxY = -Infinity;
          pitems.forEach(function(it){ var y=it.transform[5]; if(y<minY)minY=y; if(y>maxY)maxY=y; });
          var botThresh = minY + (maxY - minY) * 0.18;

          // Pass 1: join bottom-18% items without spaces (catches "2-" + "5" splits)
          var botItems = pitems.filter(function(it){ return it.transform[5] <= botThresh; })
                               .sort(function(a,b){ return a.transform[5]-b.transform[5]||a.transform[4]-b.transform[4]; });
          if (botItems.length) {
            var m1 = botItems.map(function(it){ return it.str.trim(); }).join('').match(reAny);
            if (m1) label = norm(m1[1]);
          }

          // Pass 2: scan all items from end for exact N-N match
          if (!label) {
            for (var k=pitems.length-1; k>=0&&!label; k--) {
              if (reExact.test(pitems[k].str.trim())) label = norm(pitems[k].str.trim());
            }
          }

          // Pass 3: concatenate pairs/triples of adjacent items
          if (!label) {
            for (var k=0; k<pitems.length-1&&!label; k++) {
              for (var l=k+1; l<=Math.min(k+3,pitems.length-1)&&!label; l++) {
                var cat = pitems.slice(k,l+1).map(function(it){ return it.str.trim(); }).join('');
                if (reExact.test(cat)) label = norm(cat);
              }
            }
          }

          // Pass 4: last resort — join all text and find last occurrence
          if (!label) {
            var full=pitems.map(function(it){ return it.str; }).join('');
            var rg=new RegExp('\\d+'+dp+'\\d+','g'), mm, allM=[];
            while((mm=rg.exec(full))!==null) allM.push(norm(mm[0]));
            if (allM.length) label = allM[allM.length-1];
          }

          if (label) { pageLabel = label; labelToPage.set(label, i); }
        }
      } catch(_) {}

      const item  = document.createElement('div');
      item.className = 'thumb-item' + (i === 1 ? ' active' : '');
      const labelEl = document.createElement('div');
      labelEl.className = 'thumb-label';
      labelEl.textContent = pageLabel;
      item.appendChild(c);
      item.appendChild(labelEl);
      item.addEventListener('click', () => { highlightQuery = null; renderPage(i); });
      sidebar.appendChild(item);
      loadingText.textContent = 'Thumbnails ' + i + '/' + pdfDoc.numPages;
    }
  }

  async function buildTOC() {
    var n        = pdfDoc.numPages;
    var entries  = [];
    var emptyRun = 0;

    // ── helpers (hoisted outside loop) ──────────────────────────────
    function groupLines(items) {
      var lineMap = new Map();
      items.forEach(function(it) {
        var y = Math.round(it.transform[5] / 4) * 4; // ±4 pt tolerance
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push(it);
      });
      return lineMap;
    }

    function stripLeaders(raw) {
      return raw
        // Remove runs of 2+ separator chars (dot, dash, tilde, underscore, middle-dot, ellipsis)
        // with optional whitespace between each — handles ". . . .", "~ ~", "-----", etc.
        .replace(/([.\-~_\u00b7\u2022\u2026]\s*){2,}/g, ' ')
        // Remove any trailing residue of those same chars
        .replace(/[.\-~_\u00b7\u2022\u2026\s]+$/, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseLine(items, baseX) {
      items = items.slice().sort(function(a, b) { return a.transform[4] - b.transform[4]; });
      var lineText = items.map(function(it){ return it.str; }).join('');
      var m2, lastMatch = null, lastIdx = 0;
      var rp = /\d+[-\u2013\u2011\u2012]\d+/g;
      while ((m2 = rp.exec(lineText)) !== null) { lastMatch = m2[0]; lastIdx = m2.index; }
      if (!lastMatch) return null;
      var ref  = lastMatch.replace(/[\u2013\u2011\u2012]/g, '-');
      var name = stripLeaders(lineText.slice(0, lastIdx));
      if (name.length < 2) return null;
      var target = labelToPage.get(ref);
      if (!target) return null;
      var indented = (items[0].transform[4] - baseX) > 8;
      return { name: name, ref: ref, page: target, indented: indented };
    }
    // ────────────────────────────────────────────────────────────────

    // Scan backwards from the last page; stop after 2 consecutive pages with no entries
    for (var pi = 0; pi < 8 && emptyRun < 2; pi++) {
      var pageNum = n - pi;
      if (pageNum < 1) break;
      var page = await pdfDoc.getPage(pageNum);
      var vp0  = page.getViewport({ scale: 1 });
      var tc;
      try { tc = await page.getTextContent(); } catch(_) { emptyRun++; continue; }

      var colSplit   = vp0.width / 2;
      var leftItems  = tc.items.filter(function(it){ return it.str.trim() && it.transform[4] <  colSplit; });
      var rightItems = tc.items.filter(function(it){ return it.str.trim() && it.transform[4] >= colSplit; });
      var leftBase   = leftItems.length  ? Math.min.apply(null, leftItems.map(function(it){ return it.transform[4]; })) : 0;
      var rightBase  = rightItems.length ? Math.min.apply(null, rightItems.map(function(it){ return it.transform[4]; })) : 0;

      var pageEntries = [];
      [[leftItems, leftBase], [rightItems, rightBase]].forEach(function(pair) {
        var colItems = pair[0], baseX = pair[1];
        var lineMap  = groupLines(colItems);
        Array.from(lineMap.keys()).sort(function(a, b){ return b - a; }).forEach(function(y) {
          var r = parseLine(lineMap.get(y), baseX);
          if (r) pageEntries.push(r);
        });
      });

      if (pageEntries.length === 0) { emptyRun++; } else { emptyRun = 0; entries = entries.concat(pageEntries); }
    }

    // Deduplicate by ref+name
    var seen = new Set();
    entries = entries.filter(function(e) {
      var key = e.ref + '|' + e.name;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    entries.sort(function(a, b) { return a.page - b.page; });

    var tocStatus  = document.getElementById('tocStatus');
    var tocResults = document.getElementById('tocResults');
    if (entries.length === 0) { tocStatus.textContent = 'No index entries found.'; return; }
    tocStatus.textContent = entries.length + ' entries';
    tocResults.innerHTML = '';
    entries.forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'toc-item' + (entry.indented ? ' toc-sub' : '');
      div.innerHTML = '<span class="toc-name">' + entry.name + '</span><span class="toc-ref">' + entry.ref + '</span>';
      div.addEventListener('click', function() {
        renderPage(entry.page);
        document.getElementById('tocPanel').classList.remove('open');
      });
      tocResults.appendChild(div);
    });
  }

  async function buildTextIndex() {
    searchStatus.textContent = 'Indexing text…';
    let indexed = 0;
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const tc   = await page.getTextContent();
      const text = tc.items.map(function(it){ return it.str; }).join(' ').replace(/\s+/g,' ').trim();
      if (text.length > 3) { textIndex.set(i, text); indexed++; }
    }
    searchIndexed = true;
    searchStatus.textContent = indexed > 0
      ? '\u2713 ' + indexed + ' pages indexed \u2014 ready to search'
      : '\u26a0 No embedded text found. This PDF appears to be scanned images \u2014 text search unavailable.';
  }

  function doSearch() {
    const raw = searchInput.value.trim();
    searchResults.innerHTML = '';
    if (!raw) return;
    if (!searchIndexed) { searchStatus.textContent = 'Still indexing\u2026 please wait.'; return; }
    if (textIndex.size === 0) { searchStatus.textContent = '\u26a0 No text to search \u2014 PDF is image-only.'; return; }

    const query  = raw.toLowerCase();
    const reEsc  = raw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re     = new RegExp(reEsc, 'gi');
    const matches = [];

    textIndex.forEach(function(text, pageNum) {
      if (!text.toLowerCase().includes(query)) return;
      var idx  = text.toLowerCase().indexOf(query);
      var s    = Math.max(0, idx - 65);
      var e    = Math.min(text.length, idx + raw.length + 65);
      var snip = (s > 0 ? '\u2026' : '') +
        text.slice(s, e).replace(re, function(m){ return '<mark>' + m + '</mark>'; }) +
        (e < text.length ? '\u2026' : '');
      matches.push({ pageNum: pageNum, snip: snip });
    });

    searchStatus.textContent = matches.length
      ? matches.length + ' result' + (matches.length > 1 ? 's' : '') + ' for "' + raw + '"'
      : 'No results for "' + raw + '"';

    matches.forEach(function(m) {
      var div = document.createElement('div');
      div.className = 'sr';
      div.innerHTML = '<span class="pn">Page ' + m.pageNum + '</span><span class="snip">' + m.snip + '</span>';
      div.addEventListener('click', function() {
        highlightQuery = raw;
        renderPage(m.pageNum);
        searchPanel.classList.remove('open');
      });
      searchResults.appendChild(div);
    });
  }

  (async function() {
    try {
      var task = pdfjsLib.getDocument(PDF_URL);
      task.onProgress = function(p) {
        if (p.total) loadingText.textContent = 'Loading\u2026 ' + Math.round(p.loaded/p.total*100) + '%';
      };
      pdfDoc = await task.promise;
      totalSpan.textContent = pdfDoc.numPages;
      pageInput.max = pdfDoc.numPages;
      await renderPage(1);
      overlay.style.display = 'none';
      buildThumbs().then(buildTOC);
      buildTextIndex();
    } catch(err) {
      loadingText.textContent = 'Failed to load PDF. Make sure F3manual.pdf is in the same folder.';
      console.error(err);
    }
  })();

  function prevPage() { if (currentPage > 1) { highlightQuery = null; renderPage(currentPage - 1); } }
  function nextPage() { if (pdfDoc && currentPage < pdfDoc.numPages) { highlightQuery = null; renderPage(currentPage + 1); } }

  prevBtn.addEventListener('click', prevPage);
  nextBtn.addEventListener('click', nextPage);

  pageInput.addEventListener('change', function() {
    var n = parseInt(pageInput.value, 10);
    if (!isNaN(n)) renderPage(n); else pageInput.value = currentPage;
  });

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); nextPage(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevPage(); }
  });

  // Swipe — only triggers on clear horizontal swipe; vertical scroll still works
  var tx = 0, ty = 0;
  viewport_el.addEventListener('touchstart', function(e) {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, { passive: true });
  viewport_el.addEventListener('touchend', function(e) {
    var dx = tx - e.changedTouches[0].clientX;
    var dy = ty - e.changedTouches[0].clientY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
      if (dx > 0) { nextPage(); flash('R'); } else { prevPage(); flash('L'); }
    }
  }, { passive: true });

  function flash(dir) {
    var el = document.getElementById(dir === 'L' ? 'swipeL' : 'swipeR');
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 380);
  }

  const STEPS    = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3];
  const AUTOMODES = new Set(['auto','fitw','fith']);

  function setZoom(val) { currentScale = val; zoomSelect.value = val; if (pdfDoc) renderPage(currentPage); }

  zoomSelect.addEventListener('change', function() { setZoom(zoomSelect.value); });
  document.getElementById('zoomIn').addEventListener('click', function() {
    var cur  = AUTOMODES.has(currentScale) ? 1 : parseFloat(currentScale);
    var next = STEPS.find(function(v){ return v > cur; }) || STEPS[STEPS.length-1];
    setZoom(String(next));
  });
  document.getElementById('zoomOut').addEventListener('click', function() {
    var cur  = AUTOMODES.has(currentScale) ? 1 : parseFloat(currentScale);
    var prev = STEPS.slice().reverse().find(function(v){ return v < cur; }) || STEPS[0];
    setZoom(String(prev));
  });

  document.getElementById('vpPrevBtn').addEventListener('click', prevPage);
  document.getElementById('vpNextBtn').addEventListener('click', nextPage);

  document.getElementById('sidebarToggle').addEventListener('click', function() {
    sidebarVisible = !sidebarVisible;
    sidebar.style.display = sidebarVisible ? '' : 'none';
    if (pdfDoc) renderPage(currentPage);
  });

  document.getElementById('searchToggle').addEventListener('click', function() {
    document.getElementById('tocPanel').classList.remove('open');
    searchPanel.classList.toggle('open');
    if (searchPanel.classList.contains('open')) searchInput.focus();
  });
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
  document.getElementById('tocToggle').addEventListener('click', function() {
    searchPanel.classList.remove('open');
    document.getElementById('tocPanel').classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    var inSearch = searchPanel.contains(e.target) || e.target.id === 'searchToggle';
    var inToc    = document.getElementById('tocPanel').contains(e.target) || e.target.id === 'tocToggle';
    if (!inSearch && !inToc) { searchPanel.classList.remove('open'); document.getElementById('tocPanel').classList.remove('open'); }
    else if (!inSearch) { searchPanel.classList.remove('open'); }
    else if (!inToc)    { document.getElementById('tocPanel').classList.remove('open'); }
  });

  var rTimer;
  window.addEventListener('resize', function() {
    clearTimeout(rTimer);
    rTimer = setTimeout(function() {
      if (pdfDoc && AUTOMODES.has(currentScale)) renderPage(currentPage);
    }, 180);
  });
</script>
</body>
</html>
