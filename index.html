<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 Manual</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #8892a4;
      --page-bg: #fdf6e3;
      --shadow: rgba(0,0,0,0.6);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.2rem;
      gap: 1rem;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:disabled { background: #444; cursor: not-allowed; opacity: 1; }

    .page-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    #pageInput {
      width: 4rem;
      text-align: center;
      background: #0d0d1f;
      color: var(--text);
      border: 1px solid #444;
      border-radius: 5px;
      padding: 0.3rem 0.4rem;
      font-size: 0.9rem;
    }

    .zoom-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    select {
      background: #0d0d1f;
      color: var(--text);
      border: 1px solid #444;
      border-radius: 5px;
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ── Book viewport ── */
    #viewport {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    #bookWrapper {
      position: relative;
      filter: drop-shadow(0 8px 32px var(--shadow));
    }

    /* Spine effect */
    #bookWrapper::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -6px;
      width: 12px;
      background: linear-gradient(to right, #888 0%, #ccc 40%, #aaa 60%, #666 100%);
      border-radius: 3px 0 0 3px;
      z-index: 1;
    }

    canvas#pdfCanvas {
      display: block;
      background: var(--page-bg);
      border-radius: 0 4px 4px 0;
    }

    /* ── Loading overlay ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 100;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingText { color: var(--muted); font-size: 0.95rem; }

    /* ── Thumbnail strip (sidebar) ── */
    #sidebar {
      width: 130px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid #2a2a4a;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .thumb-item {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color .15s;
      flex-shrink: 0;
    }
    .thumb-item:hover { border-color: var(--muted); }
    .thumb-item.active { border-color: var(--accent); }
    .thumb-item canvas { display: block; width: 100%; }
    .thumb-label {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 1px 0 2px;
      background: #0d0d1f;
    }

    /* layout with sidebar */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #sidebarToggle {
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
    }

    /* ── Keyboard hint ── */
    #hint {
      position: fixed;
      bottom: 0.8rem;
      right: 1rem;
      font-size: 0.72rem;
      color: #3a3a5c;
      pointer-events: none;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading F3 Manual…</div>
</div>

<header>
  <span class="title">F3 Manual</span>

  <div class="controls">
    <button id="sidebarToggle" title="Toggle page thumbnails">☰ Pages</button>

    <button id="prevBtn" disabled>&#8592; Prev</button>

    <div class="page-info">
      <input id="pageInput" type="number" min="1" value="1" title="Jump to page" />
      <span>/ <span id="totalPages">–</span></span>
    </div>

    <button id="nextBtn" disabled>Next &#8594;</button>

    <div class="zoom-group">
      <button id="zoomOut" title="Zoom out">&#8722;</button>
      <select id="zoomSelect" title="Zoom level">
        <option value="auto">Fit Width</option>
        <option value="0.5">50%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
      </select>
      <button id="zoomIn" title="Zoom in">&#43;</button>
    </div>
  </div>
</header>

<div id="main">
  <div id="sidebar"></div>
  <div id="viewport">
    <div id="bookWrapper">
      <canvas id="pdfCanvas"></canvas>
    </div>
  </div>
</div>

<div id="hint">← → arrow keys to turn pages</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'F3manual.pdf';
  const THUMB_SCALE = 0.18;

  let pdfDoc = null;
  let currentPage = 1;
  let currentScale = 'auto'; // 'auto' or numeric
  let sidebarVisible = true;

  const canvas      = document.getElementById('pdfCanvas');
  const ctx         = canvas.getContext('2d');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const pageInput   = document.getElementById('pageInput');
  const totalSpan   = document.getElementById('totalPages');
  const zoomSelect  = document.getElementById('zoomSelect');
  const sidebar     = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const overlay     = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');
  const viewport_el = document.getElementById('viewport');

  // ── Rendering ──────────────────────────────────────────────
  async function renderPage(num) {
    const page = await pdfDoc.getPage(num);
    const scale = computeScale(page);
    const vp = page.getViewport({ scale });

    canvas.width  = vp.width;
    canvas.height = vp.height;

    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    // scroll page into view at top
    viewport_el.scrollTo({ top: 0, behavior: 'smooth' });

    // sync controls
    currentPage = num;
    pageInput.value = num;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;

    // highlight active thumb
    document.querySelectorAll('.thumb-item').forEach((el, i) => {
      el.classList.toggle('active', i + 1 === num);
      if (i + 1 === num) el.scrollIntoView({ block: 'nearest' });
    });
  }

  function computeScale(page) {
    if (currentScale !== 'auto') return parseFloat(currentScale);
    const vp = page.getViewport({ scale: 1 });
    const available = viewport_el.clientWidth - 60; // padding + spine
    return available / vp.width;
  }

  // ── Thumbnails ─────────────────────────────────────────────
  async function buildThumbs() {
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale: THUMB_SCALE });
      const c = document.createElement('canvas');
      c.width  = vp.width;
      c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

      const item = document.createElement('div');
      item.className = 'thumb-item';
      const label = document.createElement('div');
      label.className = 'thumb-label';
      label.textContent = i;
      item.appendChild(c);
      item.appendChild(label);
      item.addEventListener('click', () => renderPage(i));
      sidebar.appendChild(item);

      // update loading progress
      loadingText.textContent = `Building thumbnails… ${i}/${pdfDoc.numPages}`;
    }
  }

  // ── Load PDF ───────────────────────────────────────────────
  (async () => {
    try {
      const loadTask = pdfjsLib.getDocument(PDF_URL);
      loadTask.onProgress = ({ loaded, total }) => {
        if (total) {
          const pct = Math.round((loaded / total) * 100);
          loadingText.textContent = `Loading… ${pct}%`;
        }
      };
      pdfDoc = await loadTask.promise;
      totalSpan.textContent = pdfDoc.numPages;
      pageInput.max = pdfDoc.numPages;

      // render first page, then build thumbs
      await renderPage(1);
      overlay.style.display = 'none';
      await buildThumbs();
    } catch (err) {
      loadingText.textContent = 'Failed to load PDF. Make sure F3manual.pdf is in the same folder.';
      console.error(err);
    }
  })();

  // ── Navigation ─────────────────────────────────────────────
  prevBtn.addEventListener('click', () => {
    if (currentPage > 1) renderPage(currentPage - 1);
  });

  nextBtn.addEventListener('click', () => {
    if (currentPage < pdfDoc?.numPages) renderPage(currentPage + 1);
  });

  pageInput.addEventListener('change', () => {
    const n = parseInt(pageInput.value, 10);
    if (n >= 1 && n <= pdfDoc?.numPages) renderPage(n);
    else pageInput.value = currentPage;
  });

  document.addEventListener('keydown', e => {
    if (['ArrowRight', 'PageDown'].includes(e.key)) {
      if (currentPage < pdfDoc?.numPages) renderPage(currentPage + 1);
    } else if (['ArrowLeft', 'PageUp'].includes(e.key)) {
      if (currentPage > 1) renderPage(currentPage - 1);
    }
  });

  // ── Zoom ───────────────────────────────────────────────────
  const STEP = 0.15;
  const ZOOM_VALUES = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3];

  function setZoom(val) {
    currentScale = val;
    zoomSelect.value = val;
    if (pdfDoc) renderPage(currentPage);
  }

  zoomSelect.addEventListener('change', () => setZoom(zoomSelect.value));

  document.getElementById('zoomIn').addEventListener('click', () => {
    const cur = currentScale === 'auto' ? 1 : parseFloat(currentScale);
    const next = ZOOM_VALUES.find(v => v > cur) ?? ZOOM_VALUES[ZOOM_VALUES.length - 1];
    setZoom(next.toString());
  });

  document.getElementById('zoomOut').addEventListener('click', () => {
    const cur = currentScale === 'auto' ? 1 : parseFloat(currentScale);
    const prev = [...ZOOM_VALUES].reverse().find(v => v < cur) ?? ZOOM_VALUES[0];
    setZoom(prev.toString());
  });

  // ── Sidebar toggle ─────────────────────────────────────────
  sidebarToggle.addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.style.display = sidebarVisible ? '' : 'none';
    if (pdfDoc) renderPage(currentPage); // recompute fit-width
  });

  // re-render on window resize (fit-width mode)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (pdfDoc && currentScale === 'auto') renderPage(currentPage);
    }, 200);
  });
</script>
</body>
</html>
